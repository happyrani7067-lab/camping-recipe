<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>캠핑 레시피 대본 생성기</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fafafa; color: #222; min-height: 100vh; padding: 20px; }
.wrap { max-width: 600px; margin: 0 auto; }
.header { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; padding-top: 10px; }
.header-title { font-size: 20px; font-weight: 600; color: #222; }
.header-sub { font-size: 13px; color: #888; margin-top: 2px; }
label { font-size: 13px; color: #666; font-weight: 500; display: block; margin-bottom: 6px; }
.api-box { background: #fff8e1; border: 1px solid #ffe082; border-radius: 8px; padding: 14px; margin-bottom: 20px; }
.api-box label { color: #e65100; margin-bottom: 6px; }
.api-row { display: flex; gap: 8px; align-items: center; }
.api-input { flex: 1; padding: 9px 12px; font-size: 13px; border: 1px solid #ffcc80; border-radius: 8px; background: #fff; color: #222; font-family: monospace; }
.api-save-btn { padding: 9px 14px; font-size: 13px; border: none; border-radius: 8px; background: #e65100; color: white; cursor: pointer; white-space: nowrap; font-weight: 600; }
.api-status { font-size: 12px; margin-top: 6px; color: #888; }
.api-status.ok { color: #2e7d32; }
.series-btns { display: flex; gap: 8px; margin-bottom: 16px; }
.series-btn { flex: 1; padding: 10px 8px; font-size: 13px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #666; cursor: pointer; text-align: center; transition: all 0.15s; }
.series-btn.active { background: #fff3e0; border-color: #e65100; color: #e65100; font-weight: 600; }
.input-row { display: flex; gap: 8px; margin-bottom: 12px; }
input[type=text] { flex: 1; padding: 10px 12px; font-size: 15px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #222; outline: none; }
input[type=text]:focus { border-color: #e65100; }
.rec-btn { padding: 10px 14px; font-size: 13px; border: 1px solid #e65100; border-radius: 8px; background: #fff3e0; color: #e65100; cursor: pointer; white-space: nowrap; font-weight: 600; }
.menu-list { display: none; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; padding: 12px; background: #f5f5f5; border-radius: 8px; }
.menu-chip { padding: 6px 12px; font-size: 13px; border: 1px solid #ddd; border-radius: 20px; background: #fff; color: #333; cursor: pointer; transition: all 0.15s; }
.menu-chip:hover { background: #fff3e0; border-color: #e65100; color: #e65100; }
.gen-btn { width: 100%; padding: 13px; font-size: 15px; font-weight: 600; background: #e65100; color: white; border: none; border-radius: 8px; cursor: pointer; margin-bottom: 20px; transition: opacity 0.15s; }
.gen-btn:hover { opacity: 0.88; }
.gen-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.loading { text-align: center; padding: 2rem; color: #888; font-size: 14px; display: none; }
.results { display: none; flex-direction: column; gap: 12px; }
.card { background: #fff; border: 1px solid #eee; border-radius: 12px; overflow: hidden; }
.card-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #f9f9f9; border-bottom: 1px solid #eee; }
.card-label { font-size: 13px; font-weight: 600; color: #333; }
.card-badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; background: #fff3e0; color: #e65100; border: 1px solid #ffccbc; }
.card-body { padding: 14px 16px; }
.card-text { font-size: 14px; color: #333; line-height: 1.75; white-space: pre-wrap; word-break: break-all; }
.copy-btn { margin-top: 10px; width: 100%; padding: 9px; font-size: 13px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #666; cursor: pointer; transition: all 0.15s; }
.copy-btn:hover { background: #f5f5f5; }
.copy-btn.copied { color: #2e7d32; border-color: #a5d6a7; background: #f1f8e9; }
.tip { font-size: 12px; color: #aaa; text-align: center; padding: 12px 0 4px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <span style="font-size:26px;">🏕️</span>
    <div>
      <div class="header-title">캠핑 레시피 대본 생성기</div>
      <div class="header-sub">메뉴 선택 → 쓰레드 대본 + 제미나이 프롬프트 자동생성</div>
    </div>
  </div>

  <div class="api-box">
    <label>🔑 Anthropic API 키</label>
    <div class="api-row">
      <input class="api-input" type="password" id="apiKey" placeholder="sk-ant-xxxxxx 붙여넣기" />
      <button class="api-save-btn" onclick="saveKey()">저장</button>
    </div>
    <div class="api-status" id="apiStatus">API 키를 입력하고 저장하세요 (브라우저에만 저장, 외부 전송 없음)</div>
  </div>

  <label>시리즈 선택</label>
  <div class="series-btns">
    <div class="series-btn active" data-val="안주" onclick="setSeries(this)">🍺 캠핑 안주</div>
    <div class="series-btn" data-val="간편식" onclick="setSeries(this)">🍳 캠핑 간편식</div>
  </div>

  <label>요리명</label>
  <div class="input-row">
    <input type="text" id="dish" placeholder="직접 입력하거나 추천받기 클릭!" />
    <button class="rec-btn" onclick="showMenus()">추천받기</button>
  </div>

  <div class="menu-list" id="menuList"></div>

  <button class="gen-btn" id="genBtn" onclick="generate()">대본 생성하기</button>
  <div class="loading" id="loading">✍️ AI가 대본을 작성 중이에요...</div>

  <div class="results" id="results">
    <div class="card">
      <div class="card-header">
        <span class="card-label">포스트 1 — 훅 멘트</span>
        <span class="card-badge">사진 2장</span>
      </div>
      <div class="card-body">
        <div class="card-text" id="post1"></div>
        <button class="copy-btn" onclick="copyText('post1',this)">복사하기</button>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-label">포스트 2 — 레시피 본문</span>
        <span class="card-badge">사진 2장</span>
      </div>
      <div class="card-body">
        <div class="card-text" id="post2"></div>
        <button class="copy-btn" onclick="copyText('post2',this)">복사하기</button>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-label">제미나이 이미지 프롬프트</span>
        <span class="card-badge">사진 생성용</span>
      </div>
      <div class="card-body">
        <div class="card-text" id="prompt"></div>
        <button class="copy-btn" onclick="copyText('prompt',this)">복사하기</button>
      </div>
    </div>
    <div class="tip">쿠팡 링크는 실제 상품 링크로 교체해서 사용하세요</div>
  </div>
</div>

<script>
let selectedSeries = '안주';
let apiKey = localStorage.getItem('camping_api_key') || '';

const menus = {
  '안주': ['버터 마늘 새우구이','소시지 치즈 볶음','삼겹살 깻잎쌈','닭날개 간장구이','베이컨 감자 꼬치','오징어 버터구이','참치 김치전','스팸 구이'],
  '간편식': ['참치 김치 볶음밥','스팸 즉석 덮밥','라면 된장찌개','햄 치즈 토스트','컵밥 제육볶음','부대찌개','짜파게티 캠핑식','카레 즉석밥']
};

if (apiKey) {
  document.getElementById('apiKey').value = apiKey;
  document.getElementById('apiStatus').textContent = '✅ API 키 저장됨';
  document.getElementById('apiStatus').className = 'api-status ok';
}

function saveKey() {
  const val = document.getElementById('apiKey').value.trim();
  if (!val) { alert('API 키를 입력해주세요!'); return; }
  apiKey = val;
  localStorage.setItem('camping_api_key', val);
  document.getElementById('apiStatus').textContent = '✅ API 키 저장됨 (이 브라우저에만 저장)';
  document.getElementById('apiStatus').className = 'api-status ok';
}

function setSeries(el) {
  document.querySelectorAll('.series-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  selectedSeries = el.dataset.val;
  document.getElementById('menuList').style.display = 'none';
}

function showMenus() {
  const list = document.getElementById('menuList');
  list.innerHTML = menus[selectedSeries].map(m => `<div class="menu-chip" onclick="selectMenu('${m}')">${m}</div>`).join('');
  list.style.display = 'flex';
}

function selectMenu(name) {
  document.getElementById('dish').value = name;
  document.getElementById('menuList').style.display = 'none';
}

async function generate() {
  if (!apiKey) { alert('API 키를 먼저 입력하고 저장해주세요!'); return; }
  const dish = document.getElementById('dish').value.trim();
  if (!dish) { alert('요리명을 입력하거나 추천받기를 눌러주세요!'); return; }
  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('results').style.display = 'none';

  const systemPrompt = `너는 쓰레드(Threads) SNS 캠핑 요리 콘텐츠 전문 작가야.
캠핑 ${selectedSeries} 시리즈 포스팅 대본을 작성해줘.
반드시 아래 JSON 형식으로만 응답해. 다른 말은 절대 하지마.

{
  "post1": "훅 멘트 3~4줄. 캠핑 감성. 공감 유도. ㅠㅠ/ㅋㅋ 자연스러운 말투",
  "post2": "[광고] 캠핑 ${selectedSeries} 시리즈\\n\\n요리명\\n\\n재료 섹션 분량 포함\\n\\n👉핵심재료 이거야👈\\nlink.coupang.com/a/AF5363278\\n짧은 팁 한줄\\n\\n번호 이모지 레시피 스텝 4~5개\\n\\n이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.",
  "gemini_prompt": "[완성샷] 영어로 캠핑 분위기 음식 사진 프롬프트\\n\\n[조리과정샷] 영어로 캠핑 코펠 그릴 조리 장면 프롬프트"
}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: `요리명: ${dish}, 시리즈: 캠핑 ${selectedSeries}` }]
      })
    });
    const data = await res.json();
    const text = data.content[0].text.replace(/```json|```/g, '').trim();
    const json = JSON.parse(text);
    document.getElementById('post1').textContent = json.post1;
    document.getElementById('post2').textContent = json.post2;
    document.getElementById('prompt').textContent = json.gemini_prompt;
    document.getElementById('results').style.display = 'flex';
  } catch(e) {
    alert('생성 중 오류가 발생했어요. API 키를 확인해주세요.');
  }
  document.getElementById('loading').style.display = 'none';
  btn.disabled = false;
}

function copyText(id, btn) {
  navigator.clipboard.writeText(document.getElementById(id).textContent).then(() => {
    btn.textContent = '복사 완료!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '복사하기'; btn.classList.remove('copied'); }, 2000);
  });
}
</script>
</body>
</html>
